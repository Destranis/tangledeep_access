name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package source
        run: |
          cd src
          zip -r ../TangledeepAccess-source.zip .

      - name: Package mod
        run: |
          zip -r TangledeepAccess.zip \
            BepInEx/ \
            doorstop_config.ini \
            winhttp.dll \
            Tolk.dll \
            TolkDotNet.dll \
            SAAPI64.dll

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: TangledeepAccess ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            TangledeepAccess.zip
            TangledeepAccess-source.zip
